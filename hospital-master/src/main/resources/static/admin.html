<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>医秒通 · 管理端</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
:root{--bg:#f0f2f5;--card:#fff;--primary:#1677ff;--primary-hover:#4096ff;--danger:#ff4d4f;--danger-hover:#ff7875;--success:#52c41a;--warning:#faad14;--text:#1f1f1f;--text2:#666;--text3:#999;--border:#e8e8e8;--shadow:0 2px 8px rgba(0,0,0,.08);--radius:8px;--sidebar-w:240px;--header-h:56px}
*{margin:0;padding:0;box-sizing:border-box}
body{font:14px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--primary);text-decoration:none}
input,select,textarea{font:inherit;padding:8px 12px;border:1px solid var(--border);border-radius:6px;outline:none;width:100%;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(22,119,255,.1)}
textarea{resize:vertical;min-height:80px}
button{cursor:pointer;font:inherit;border:none;border-radius:6px;padding:8px 20px;transition:all .2s}
.btn-p{background:var(--primary);color:#fff}.btn-p:hover{background:var(--primary-hover)}
.btn-d{background:var(--danger);color:#fff}.btn-d:hover{background:var(--danger-hover)}
.btn-o{background:#fff;color:var(--text);border:1px solid var(--border)}.btn-o:hover{border-color:var(--primary);color:var(--primary)}
.btn-s{background:var(--success);color:#fff}.btn-w{background:var(--warning);color:#fff}
.btn-sm{padding:4px 12px;font-size:13px}.btn-xs{padding:2px 8px;font-size:12px}
.btn-group{display:flex;gap:8px;flex-wrap:wrap}
table{width:100%;border-collapse:collapse;background:var(--card);border-radius:var(--radius);overflow:hidden}
th,td{padding:12px 16px;text-align:left;border-bottom:1px solid var(--border)}
th{background:#fafafa;font-weight:600;color:var(--text2);font-size:13px;white-space:nowrap}
tr:hover td{background:#fafafa}
.card{background:var(--card);border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);margin-bottom:16px}
.card-title{font-size:16px;font-weight:600;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.form-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px 16px;margin-bottom:16px}
.form-col{display:flex;flex-direction:column;gap:4px}
.form-col label{font-size:13px;color:var(--text2);font-weight:500}
.pagination{display:flex;justify-content:center;align-items:center;gap:4px;margin-top:16px}
.pagination button{padding:6px 12px;font-size:13px;border:1px solid var(--border);background:#fff;border-radius:4px}
.pagination button.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.pagination button:disabled{opacity:.5;cursor:not-allowed}
.pagination span{font-size:13px;color:var(--text2);margin:0 8px}
.tag{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:500}
.tag-on{background:#e6f7ff;color:var(--primary)}.tag-off{background:#fff2f0;color:var(--danger)}
.tag-s{background:#f6ffed;color:var(--success)}.tag-w{background:#fffbe6;color:#d48806}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:999;display:flex;align-items:center;justify-content:center}
.modal{background:var(--card);border-radius:12px;padding:24px;max-width:700px;width:90%;max-height:85vh;overflow-y:auto;box-shadow:0 4px 24px rgba(0,0,0,.15)}
.modal h3{font-size:18px;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.toast{position:fixed;top:24px;left:50%;transform:translateX(-50%);z-index:9999;padding:10px 24px;border-radius:6px;font-size:14px;animation:toastIn .3s;pointer-events:none}
.toast-ok{background:#f6ffed;color:var(--success);border:1px solid #b7eb8f}
.toast-err{background:#fff2f0;color:var(--danger);border:1px solid #ffccc7}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.ws-notify-wrap{position:fixed;top:70px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:12px;max-height:calc(100vh - 100px);overflow-y:auto}
.ws-notify{width:320px;background:var(--card);border-radius:var(--radius);box-shadow:0 4px 16px rgba(0,0,0,.15);padding:14px 16px;border-left:4px solid var(--primary);animation:wsNotifyIn .3s}
.ws-notify.ws-cancel{border-left-color:var(--warning)}
.ws-notify .ws-title{font-weight:600;font-size:14px;margin-bottom:4px;display:flex;justify-content:space-between}
.ws-notify .ws-content{font-size:13px;color:var(--text2)}
@keyframes wsNotifyIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
.search-bar{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap;margin-bottom:16px}
.search-bar .field{display:flex;flex-direction:column;gap:4px}
.search-bar .field label{font-size:13px;color:var(--text2)}
.search-bar .field input,.search-bar .field select{padding:6px 12px;width:auto;min-width:160px}
.tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid var(--border)}
.tabs button{padding:10px 24px;background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-2px;font-size:14px;color:var(--text2);border-radius:0}
.tabs button.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;margin-bottom:20px}
.stat-card{background:var(--card);padding:20px;border-radius:var(--radius);box-shadow:var(--shadow);text-align:center}
.stat-card .num{font-size:32px;font-weight:700;color:var(--primary)}
.stat-card .label{font-size:13px;color:var(--text2);margin-top:4px}
.empty{text-align:center;padding:40px;color:var(--text3);font-size:15px}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1677ff 0%,#69b1ff 100%)}
.login-box{background:#fff;border-radius:16px;padding:40px;width:400px;box-shadow:0 8px 40px rgba(0,0,0,.12)}
.login-box h1{text-align:center;font-size:28px;margin-bottom:4px;color:var(--primary)}
.login-box .sub{text-align:center;color:var(--text3);margin-bottom:32px;font-size:14px}
.login-box .form-group{margin-bottom:20px}
.login-box .form-group label{display:block;margin-bottom:6px;font-weight:500;font-size:14px}
.login-box .form-group input{padding:10px 14px;font-size:15px}
.login-box button{width:100%;padding:12px;font-size:16px;font-weight:600;margin-top:8px}
.login-err{color:var(--danger);text-align:center;font-size:13px;margin-top:12px;display:none}
.layout{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-w);background:#001529;color:#fff;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:100;transition:transform .3s}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:16px 20px;font-size:18px;font-weight:700;border-bottom:1px solid rgba(255,255,255,.1);color:#fff}
.sidebar-logo .icon{font-size:24px}
.sidebar .user{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:10px}
.sidebar .user .avatar{width:36px;height:36px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-size:16px}
.sidebar .user .name{font-size:14px;font-weight:500}
.sidebar .user .role{font-size:12px;color:rgba(255,255,255,.45)}
.sidebar nav{margin-top:8px}
.sidebar .nav-group{margin-bottom:4px}
.sidebar .nav-group-title{padding:12px 20px 6px;font-size:11px;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:1px}
.sidebar .nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:14px;color:rgba(255,255,255,.65);cursor:pointer;transition:all .2s;border-left:3px solid transparent}
.sidebar .nav-item:hover{color:#fff;background:rgba(255,255,255,.05)}
.sidebar .nav-item.active{color:#fff;background:var(--primary);border-left-color:#fff}
.sidebar .nav-item .ni{font-size:16px;width:20px;text-align:center}
.main{margin-left:var(--sidebar-w);flex:1;min-width:0}
.header{height:var(--header-h);background:var(--card);display:flex;align-items:center;justify-content:space-between;padding:0 24px;box-shadow:var(--shadow);position:sticky;top:0;z-index:50}
.header .bread{font-size:15px;font-weight:600}
.header .actions{display:flex;align-items:center;gap:12px}
.page{padding:20px 24px}
.page-title{font-size:20px;font-weight:700;margin-bottom:20px;color:var(--text)}
.hidden{display:none!important}
@media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0}.form-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="loginPage" class="login-wrap">
<div class="login-box">
<h1>🏥 医秒通</h1><div class="sub">智慧医院管理平台</div>
<div class="form-group"><label>账号</label><input id="loginName" placeholder="请输入管理员账号" autocomplete="off"></div>
<div class="form-group"><label>密码</label><input id="loginPwd" type="password" placeholder="请输入密码" autocomplete="off"></div>
<button class="btn-p" onclick="doLogin()">登 录</button>
<div id="loginErr" class="login-err"></div>
</div></div>
<div id="mainPage" class="layout hidden">
<aside class="sidebar" id="sidebar">
<div class="sidebar-logo"><span class="icon">🏥</span> 医秒通管理</div>
<div class="user"><div class="avatar">👤</div><div><div class="name" id="adminName">管理员</div><div class="role">系统管理员</div></div></div>
<nav id="sideNav"></nav>
</aside>
<div class="main">
<header class="header"><div class="bread" id="breadcrumb">🏠 首页</div><div class="actions"><button class="btn-o btn-sm" onclick="showPwdModal()">🔑 改密</button><button class="btn-d btn-sm" onclick="doLogout()">退出</button></div></header>
<div class="page" id="pageContent"></div>
</div></div>
<div id="modalContainer"></div>
<div id="toast" class="toast hidden"></div>
<div id="wsNotifyContainer" class="ws-notify-wrap"></div>
<script>
// ==================== GLOBAL STATE ====================
const BASE = '/hospital';
let token = '';
let currentPage = 'dashboard';

const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

const api = (url, opts = {}) => {
  const headers = { 'Content-Type': 'application/json', ...opts.headers };
  if (token) headers['Authorization'] = 'Bearer ' + token;
  return fetch(BASE + url, { ...opts, headers }).then(r => {
    if (r.status === 401 || r.status === 403) { doLogout(); throw new Error('登录已过期'); }
    if (!r.ok) throw new Error('请求失败: ' + r.status);
    return r.json();
  });
};

function toast(msg, type = 'ok') {
  const t = $('#toast');
  t.textContent = msg;
  t.className = 'toast toast-' + type;
  setTimeout(() => t.classList.add('hidden'), 2500);
}

function showModal(title, bodyHtml, onSave, opts = {}) {
  const container = $('#modalContainer');
  container.innerHTML = '<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="' + (opts.wide ? 'max-width:900px' : '') + '"><h3>' + title + '</h3><div class="modal-body">' + bodyHtml + '</div><div class="btn-group" style="justify-content:flex-end;margin-top:20px"><button class="btn-o" onclick="closeModal()">取消</button>' + (onSave ? '<button class="btn-p" id="modalSaveBtn">保存</button>' : '') + '</div></div></div>';
  if (onSave) $('#modalSaveBtn').onclick = onSave;
}

function closeModal() { $('#modalContainer').innerHTML = ''; }

function renderPagination(total, pageNum, pageSize, fnName) {
  const pages = Math.ceil(total / pageSize) || 1;
  if (pages <= 1) return '';
  let h = '<div class="pagination">';
  h += '<button ' + (pageNum <= 1 ? 'disabled' : '') + ' onclick="event.stopPropagation();' + fnName + '(' + (pageNum - 1) + ')">‹</button>';
  for (let i = 1; i <= pages; i++) {
    if (i === 1 || i === pages || Math.abs(i - pageNum) <= 2) {
      h += '<button class="' + (i === pageNum ? 'active' : '') + '" onclick="event.stopPropagation();' + fnName + '(' + i + ')">' + i + '</button>';
    } else if (i === 2 || i === pages - 1) {
      h += '<span>…</span>';
    }
  }
  h += '<button ' + (pageNum >= pages ? 'disabled' : '') + ' onclick="event.stopPropagation();' + fnName + '(' + (pageNum + 1) + ')">›</button>';
  h += '<span>共 ' + total + ' 条 / ' + pages + ' 页</span></div>';
  return h;
}

// ==================== AUTH ====================
function doLogin() {
  const name = $('#loginName').value.trim();
  const pwd = $('#loginPwd').value.trim();
  if (!name || !pwd) { showLoginErr('请输入账号和密码'); return; }
  fetch(BASE + '/power/account/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: name, password: pwd }) })
    .then(r => r.json())
    .then(res => {
      if (res.code === 200) {
        token = res.data;
        localStorage.setItem('admin_token', token);
        showMain();
      } else {
        showLoginErr(res.message || '登录失败');
      }
    })
    .catch(e => showLoginErr('网络错误: ' + e.message));
}

function showLoginErr(msg) {
  const el = $('#loginErr');
  el.textContent = msg;
  el.style.display = 'block';
}

function doLogout() {
  closeWebSocket();
  if (token) api('/power/account/logout').catch(() => {});
  token = '';
  localStorage.removeItem('admin_token');
  $('#loginPage').classList.remove('hidden');
  $('#mainPage').classList.add('hidden');
  $('#loginName').value = '';
  $('#loginPwd').value = '';
}

function showPwdModal() {
  showModal('修改密码',
    '<div class="form-col"><label>账号ID</label><input id="pwdAccountId" type="number" placeholder="账号ID"></div><div class="form-col" style="margin-top:12px"><label>旧密码</label><input id="pwdOld" type="password"></div><div class="form-col" style="margin-top:12px"><label>新密码</label><input id="pwdNew" type="password"></div>',
    () => {
      const data = { accountId: parseInt($('#pwdAccountId').value), password: $('#pwdOld').value, newPassword: $('#pwdNew').value };
      api('/power/account/password', { method: 'PUT', body: JSON.stringify(data) })
        .then(res => { if (res.code === 200) { toast('密码修改成功'); closeModal(); } else toast(res.message, 'err'); })
        .catch(e => toast(e.message, 'err'));
    });
}

// ==================== SIDEBAR & NAV ====================
function showMain() {
  $('#loginPage').classList.add('hidden');
  $('#mainPage').classList.remove('hidden');
  api('/power/account/info').then(res => {
    if (res.code === 200 && res.data) $('#adminName').textContent = res.data.userName || '管理员';
  }).catch(() => {});
  buildSidebar();
  navigate('statistics');
  connectWebSocket();
}

function buildSidebar() {
  const nav = [
    { g: '📊 数据统计', items: [
      { id: 'statistics', icon: '📊', label: '数据统计' },
    ]},
    { g: '🏥 医院管理', items: [
      { id: 'hospitals', icon: '🏥', label: '医院信息' },
      { id: 'specials', icon: '📋', label: '专科管理' },
      { id: 'doctors', icon: '👨‍⚕️', label: '医生管理' },
      { id: 'plans', icon: '📅', label: '出诊计划' },
    ]},
    { g: '📋 业务管理', items: [
      { id: 'appointments', icon: '📝', label: '预约管理' },
      { id: 'payments', icon: '💰', label: '支付管理' },
      { id: 'cases', icon: '📄', label: '病例管理' },
      { id: 'notices', icon: '📢', label: '健康资讯' },
      { id: 'credit', icon: '🛡️', label: '信用管理' },
    ]},
    { g: '👥 用户管理', items: [
      { id: 'users', icon: '👤', label: '用户信息' },
      { id: 'cards', icon: '💳', label: '就诊卡' },
    ]},
    { g: '🔐 权限管理', items: [
      { id: 'accounts', icon: '🔑', label: '账号管理' },
      { id: 'roles', icon: '👥', label: '角色管理' },
      { id: 'resources', icon: '🔗', label: '资源管理' },
      { id: 'categories', icon: '📂', label: '资源分类' },
    ]},
    { g: '🤖 AI 智能', items: [
      { id: 'kb', icon: '📚', label: '知识库管理' },
    ]},
    { g: '📊 系统管理', items: [
      { id: 'logs', icon: '📊', label: '系统日志' },
      // 文件上传已整合到「健康资讯」中，不再作为独立页面
    ]},
  ];
  let h = '';
  nav.forEach(g => {
    h += '<div class="nav-group"><div class="nav-group-title">' + g.g + '</div>';
    g.items.forEach(it => {
      h += '<div class="nav-item" data-page="' + it.id + '" onclick="navigate(\'' + it.id + '\')"><span class="ni">' + it.icon + '</span> ' + it.label + '</div>';
    });
    h += '</div>';
  });
  $('#sideNav').innerHTML = h;
}

function navigate(pageId) {
  currentPage = pageId;
  $$('.nav-item').forEach(el => el.classList.remove('active'));
  const item = $('.nav-item[data-page="' + pageId + '"]');
  if (item) item.classList.add('active');
  const labels = {
    statistics:'📊 数据统计', dashboard:'🏠 首页', hospitals:'🏥 医院信息', specials:'📋 专科管理',
    clinics:'🏠 诊室管理', doctors:'👨‍⚕️ 医生管理',
    plans:'📅 出诊计划', appointments:'📝 预约管理', payments:'💰 支付管理', cases:'📄 病例管理',
    notices:'📢 健康资讯', credit:'🛡️ 信用管理', users:'👤 用户信息',
    cards:'💳 就诊卡', accounts:'🔑 账号管理', roles:'👥 角色管理',
    resources:'🔗 资源管理', categories:'📂 资源分类',
    logs:'📊 系统日志', kb:'📚 知识库管理'
  };
  $('#breadcrumb').textContent = labels[pageId] || pageId;
  const renderers = { statistics, dashboard, hospitals, specials, clinics, doctors, plans,
    appointments, payments, cases, notices, credit, users, cards, accounts, roles, resources, categories, logs, kb };
  if (renderers[pageId]) renderers[pageId]();
}

// ==================== STATISTICS ====================
// ECharts instances for resize
let _chartInstances = [];

function statistics(days) {
  days = days || 7;
  const top = 10;
  $('#pageContent').innerHTML = '<div class="page-title">📊 数据统计</div>'
    + '<div class="card" style="padding:16px;margin-bottom:16px">'
    + '<div class="stat-grid" style="grid-template-columns:repeat(6,1fr)" id="statCards">'
    + '<div class="stat-card"><div class="num" id="ovTodayAppt">-</div><div class="label">今日挂号</div></div>'
    + '<div class="stat-card"><div class="num" id="ovTodayRev">-</div><div class="label">今日营收</div></div>'
    + '<div class="stat-card"><div class="num" id="ovTodayUser">-</div><div class="label">今日新增用户</div></div>'
    + '<div class="stat-card"><div class="num" id="ovTotalAppt">-</div><div class="label">累计挂号</div></div>'
    + '<div class="stat-card"><div class="num" id="ovTotalRev">-</div><div class="label">累计营收</div></div>'
    + '<div class="stat-card"><div class="num" id="ovTotalUser">-</div><div class="label">累计用户</div></div>'
    + '</div></div>'
    + '<div class="card" style="padding:12px 16px;margin-bottom:16px">'
    + '<div style="display:flex;align-items:center;gap:12px">'
    + '<span style="font-size:14px;font-weight:600;color:var(--text2)">时间范围：</span>'
    + '<button class="btn-sm ' + (days===7?'btn-p':'btn-o') + '" onclick="statistics(7)" id="btn7d">近 7 天</button>'
    + '<button class="btn-sm ' + (days===30?'btn-p':'btn-o') + '" onclick="statistics(30)" id="btn30d">近 30 天</button>'
    + '<button class="btn-s btn-sm" style="margin-left:auto" onclick="exportStatistics()">📊 导出报表</button>'
    + '</div></div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">'
    + '<div class="card"><div class="card-title">📈 挂号量趋势</div><div id="chartApptTrend" style="height:280px"></div></div>'
    + '<div class="card"><div class="card-title">🥧 预约状态分布</div><div id="chartStatusDist" style="height:280px"></div></div>'
    + '</div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">'
    + '<div class="card"><div class="card-title">💰 营收趋势</div><div id="chartRevenueTrend" style="height:280px"></div></div>'
    + '<div class="card"><div class="card-title">🏆 科室挂号排行</div><div id="chartDeptRank" style="height:280px"></div></div>'
    + '</div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">'
    + '<div class="card"><div class="card-title">👨‍⚕️ 医生热度 Top 10</div><div id="chartDocRank" style="height:300px"></div></div>'
    + '<div class="card"><div class="card-title">🕐 上下午时段分布</div><div id="chartPeriodDist" style="height:300px"></div></div>'
    + '</div>';

  // Dispose old chart instances
  _chartInstances.forEach(c => { try { c.dispose(); } catch(e) {} });
  _chartInstances = [];

  // Fetch all stats data
  api('/admin/statistics/all?days=' + days + '&top=' + top).then(res => {

// 导出统计报表（携带 token 下载 Excel）
function exportStatistics() {
  fetch(BASE + '/admin/statistics/export', { headers: token ? { 'Authorization': 'Bearer ' + token } : {} })
    .then(r => {
      if (!r.ok) throw new Error('导出失败: ' + r.status);
      return r.blob();
    })
    .then(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '数据统计报表.xlsx';
      a.click();
      URL.revokeObjectURL(url);
      toast('报表导出成功');
    })
    .catch(e => toast(e.message, 'err'));
}

function showHospitalRelModal(hospitalId) {
  const listApi = '/hospital/special/list/' + hospitalId + '?pageNum=1&pageSize=200';
  const allApi = '/hospital/special/list?pageNum=1&pageSize=200';
  showModal('管理医院关联专科', '<div id="relContent">加载中...</div>', null, { wide: true });
  Promise.all([api(listApi).catch(() => ({ data: { list: [] } })), api(allApi).catch(() => ({ data: { list: [] } }))]).then(([linked, all]) => {
    const linkedList = (linked.data && linked.data.list) ? linked.data.list : [];
    const allList = (all.data && all.data.list) ? all.data.list : [];
    const linkedIds = new Set(linkedList.map(it => it.id));
    let h = '<div style="display:flex;gap:24px"><div style="flex:1"><h4>已关联</h4>';
    linkedList.forEach(it => { h += '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px;border-bottom:1px solid var(--border)"><span>' + (it.name||it.chineseName||it.id) + '</span><button class="btn-d btn-xs" onclick="removeHospitalRel(' + hospitalId + ',' + it.id + ')">移除</button></div>'; });
    if (!linkedList.length) h += '<div class="empty">暂无关联</div>';
    h += '</div><div style="flex:1"><h4>可关联</h4>';
    const available = allList.filter(it => !linkedIds.has(it.id));
    available.forEach(it => { h += '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px;border-bottom:1px solid var(--border)"><span>' + (it.name||it.chineseName||it.id) + '</span><button class="btn-p btn-xs" onclick="addHospitalRel(' + hospitalId + ',' + it.id + ')">关联</button></div>'; });
    if (!available.length) h += '<div class="empty">无可关联项</div>';
    h += '</div></div>';
    $('#relContent').innerHTML = h;
  });
}

function markFinish(id, cardId, planId) {
  // 先获取出诊计划详情（获取医生信息）
  api('/visit/plan/' + planId).then(planRes => {
    if (planRes.code !== 200 || !planRes.data) { toast('获取出诊计划信息失败', 'err'); return; }
    const doctorId = planRes.data.doctorId;
    const doctorName = planRes.data.doctorName || '';
    const bodyHtml = '<div class="form-row"><div class="form-col"><label>预约ID</label><input type="text" value="' + id + '" disabled></div><div class="form-col"><label>就诊卡ID</label><input type="text" value="' + cardId + '" disabled></div><div class="form-col"><label>接诊医生</label><input type="text" value="' + doctorName + '（ID:' + doctorId + '）" disabled></div></div><div class="form-col" style="margin-top:12px"><label>主诉 *</label><textarea id="fChiefComplaint" placeholder="患者自述的主要症状（如：头痛3天、发热38.5℃）" style="min-height:60px"></textarea></div><div class="form-col"><label>现病史 *</label><textarea id="fHistory" placeholder="发病过程、已做检查及治疗情况" style="min-height:60px"></textarea></div><div class="form-col"><label>诊断结果 *</label><textarea id="fDiagnosis" placeholder="医生诊断结果" style="min-height:60px"></textarea></div><div class="form-col"><label>处理意见</label><textarea id="fTreatment" placeholder="用药建议、治疗方案、复诊建议等" style="min-height:60px"></textarea></div>';
    showModal('📋 标记完成 — 填写病历', bodyHtml, async () => {
      const chiefComplaint = $('#fChiefComplaint').value.trim();
      const history = $('#fHistory').value.trim();
      const diagnosis = $('#fDiagnosis').value.trim();
      const treatment = $('#fTreatment').value.trim();
      if (!chiefComplaint) return toast('请填写主诉', 'err');
      if (!history) return toast('请填写现病史', 'err');
      if (!diagnosis) return toast('请填写诊断结果', 'err');
      const content = '【主诉】' + chiefComplaint + '\n【现病史】' + history + '\n【诊断结果】' + diagnosis + (treatment ? '\n【处理意见】' + treatment : '');
      try {
        const finishRes = await api('/visit/appointment/finish/' + id, { method: 'PUT' });
        if (finishRes.code !== 200) { toast(finishRes.message || '标记完成失败', 'err'); return; }
        const caseBody = { cardId: cardId, appointmentId: id, doctorId: doctorId, content: content };
        const caseRes = await api('/user/case', { method: 'POST', body: JSON.stringify(caseBody) });
        if (caseRes.code === 200) { toast('✅ 已标记完成并创建病例'); closeModal(); searchAppointments(1); }
        else { toast('标记完成，但创建病例失败：' + (caseRes.message || ''), 'err'); closeModal(); searchAppointments(1); }
      } catch(e) { toast(e.message, 'err'); }
    }, { wide: true });
  }).catch(e => toast(e.message, 'err'));
}

// ==================== 9. 健康资讯 ====================
function notices() {
  let h = '<div class="page-title">📢 健康资讯</div><div class="card"><div class="card-title">发布资讯</div><div class="form-row"><div class="form-col"><label>选择医院 *</label><select id="fNoticeHosId"><option value="">— 请选择医院 —</option></select></div><div class="form-col"><label>标题 *</label><input id="fNoticeTitle"></div><div class="form-col"><label>图片</label><div style="display:flex;gap:8px"><input id="fNoticePic" placeholder="图片URL（可选）" style="flex:1"><input type="file" id="noticeUploadFile" accept="image/*" style="display:none" onchange="doPictureUpload(\'noticeUploadFile\',\'fNoticePic\',\'noticeUploadStatus\')"><button class="btn-o btn-sm" onclick="$(\'#noticeUploadFile\').click()" title="上传图片">📷 上传</button></div><div id="noticeUploadStatus" style="font-size:12px;color:var(--text3);margin-top:4px"></div></div></div><div class="form-col" style="margin-top:12px"><label>内容 *</label><textarea id="fNoticeContent" style="min-height:150px"></textarea></div><div style="margin-top:16px"><button class="btn-p" onclick="publishNotice()">📢 发布资讯</button></div></div><div class="card"><div class="card-title">已有资讯 <button class="btn-o btn-sm" onclick="loadNotices()">🔄 刷新</button></div><div id="noticeList"><div class="empty" style="padding:20px">加载中...</div></div></div>';
  $('#pageContent').innerHTML = h;
  // 加载医院列表到下拉框
  api('/hospital/info/list?pageNum=1&pageSize=200').then(r => {
    if (r.code === 200 && r.data && r.data.list) {
      const sel = $('#fNoticeHosId');
      sel.innerHTML = '<option value="">— 请选择医院 —</option>';
      r.data.list.forEach(hos => {
        sel.innerHTML += '<option value="' + hos.id + '">' + (hos.name || '医院#' + hos.id) + '</option>';
      });
    }
  }).catch(() => {});
  // 进入页面自动加载已有资讯
  loadNotices();
}

function publishNotice() {
  const hospitalId = $('#fNoticeHosId').value;
  const title = $('#fNoticeTitle').value;
  const content = $('#fNoticeContent').value;
  const picture = $('#fNoticePic').value;
  if (!hospitalId || !title || !content) { toast('请填写必填项', 'err'); return; }
  const params = new URLSearchParams({ hospitalId: hospitalId, title: title, content: content });
  if (picture) params.append('picture', picture);
  fetch(BASE + '/notice?' + params, { method: 'POST', headers: token ? { 'Authorization': 'Bearer ' + token } : {} }).then(r => r.json()).then(res => { if (res.code === 200) { toast(res.data || '发布成功'); $('#fNoticeTitle').value = ''; $('#fNoticeContent').value = ''; loadNotices(); } else toast(res.message, 'err'); }).catch(e => toast(e.message, 'err'));
}

function doPictureUpload(fileId, targetId, statusId) {
  const file = $('#' + fileId).files[0];
  if (!file) return;
  const fd = new FormData();
  fd.append('file', file);
  $('#' + statusId).textContent = '⏳ 上传中...';
  fetch(BASE + '/picture/upload', { method: 'POST', headers: token ? { 'Authorization': 'Bearer ' + token } : {}, body: fd })
    .then(r => r.json())
    .then(res => {
      if (res.code === 200 && res.data) {
        $('#' + targetId).value = res.data;
        $('#' + statusId).textContent = '✅ 上传成功，URL已填入上方';
      } else {
        $('#' + statusId).textContent = '❌ ' + (res.message || '上传失败');
      }
    })
    .catch(() => { $('#' + statusId).textContent = '❌ 网络错误'; });
}

function loadNotices() {
  api('/hospital/notice/list/all').then(r => {
    if (r.code !== 200 || !r.data) { $('#noticeList').innerHTML = '<div class="empty">暂无资讯</div>'; return; }
    let h = '<table><thead><tr><th>ID</th><th>医院</th><th>标题</th><th>内容</th><th>图片</th><th>时间</th></tr></thead><tbody>';
    (r.data || []).forEach(n => {
      h += '<tr><td>' + n.id + '</td><td>' + (n.hospitalName||n.hospitalId) + '</td><td><b>' + (n.title||'') + '</b></td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + (n.content||'') + '</td><td>' + (n.picture ? '<img src="' + n.picture + '" style="width:40px;height:40px;object-fit:cover;border-radius:4px">' : '-') + '</td><td>' + (n.gmtCreate||'') + '</td></tr>';
    });
    h += '</tbody></table>';
    $('#noticeList').innerHTML = h;
  }).catch(e => toast(e.message, 'err'));
}

// ==================== 10. 信用管理 ====================
function credit() {
  let h = '<div class="page-title">🛡️ 信用管理</div>';
  // 四合一布局：2x2 网格
  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">';
  // 1. 黑名单验证
  h += '<div class="card"><div class="card-title">🚫 黑名单验证</div><div class="form-row"><div class="form-col"><label>就诊卡ID</label><input id="fBlackCardId" type="number"></div></div><button class="btn-p btn-sm" onclick="verifyBlack()">验证</button><div id="blackResult" style="margin-top:12px"></div></div>';
  // 2. 当月信用
  h += '<div class="card"><div class="card-title">📊 当月信用</div><div class="form-row"><div class="form-col"><label>账号ID</label><input id="fCreditAccId" type="number"></div><div class="form-col"><label>就诊卡ID</label><input id="fCreditCardId" type="number"></div></div><button class="btn-p btn-sm" onclick="queryCredit(\'current\')">查询</button><div id="creditResult" style="margin-top:12px"></div></div>';
  // 3. 全部信用
  h += '<div class="card"><div class="card-title">📈 全部信用</div><div class="form-row"><div class="form-col"><label>账号ID</label><input id="fCreditAllAccId" type="number"></div><div class="form-col"><label>就诊卡ID</label><input id="fCreditAllCardId" type="number"></div></div><button class="btn-p btn-sm" onclick="queryCredit(\'all\')">查询</button><div id="creditAllResult" style="margin-top:12px"></div></div>';

  h += '<div class="card"><div class="card-title">❌ 失信记录</div><div class="form-row"><div class="form-col"><label>就诊卡ID</label><input id="fMissCardId" type="number"></div></div><button class="btn-p btn-sm" onclick="queryMiss(1)">查询</button><div id="missResult" style="margin-top:12px"></div></div>';

function verifyBlack() {
  const cardId = $('#fBlackCardId').value;
  if (!cardId) { toast('请输入就诊卡ID', 'err'); return; }
  api('/visit/black/verify?cardId=' + cardId).then(r => {
    if (r.code === 200) {
      $('#blackResult').innerHTML = '<div class="card" style="text-align:center"><div style="font-size:48px">' + (r.data ? '🚫' : '✅') + '</div><div style="font-size:18px;font-weight:600;margin-top:8px">' + (r.data ? '该卡在黑名单中' : '该卡正常') + '</div></div>';
    } else toast(r.message, 'err');
  }).catch(e => toast(e.message, 'err'));
}

function queryCredit(type) {
  const accId = type === 'current' ? $('#fCreditAccId').value : $('#fCreditAllAccId').value;
  const cardId = type === 'current' ? $('#fCreditCardId').value : $('#fCreditAllCardId').value;
  if (!accId || !cardId) { toast('请填写完整', 'err'); return; }
  const url = type === 'current' ? '/visit/credit/current' : '/visit/credit/all';
  api(url + '?accountId=' + accId + '&cardId=' + cardId).then(r => {
    if (r.code === 200 && r.data) {
      const d = r.data;
      const el = type === 'current' ? $('#creditResult') : $('#creditAllResult');
      el.innerHTML = '<div class="stat-grid"><div class="stat-card"><div class="num">' + (d.finish||0) + '</div><div class="label">完成</div></div><div class="stat-card"><div class="num" style="color:var(--danger)">' + (d.miss||0) + '</div><div class="label">失约</div></div><div class="stat-card"><div class="num" style="color:var(--warning)">' + (d.cancel||0) + '</div><div class="label">取消</div></div>' + (d.blacklisted ? '<div class="stat-card"><div class="num" style="color:var(--danger)">🚫</div><div class="label">黑名单</div></div>' : '') + '</div>';
    } else toast(r.message, 'err');
  }).catch(e => toast(e.message, 'err'));
}

function queryMiss(pageNum) {
  const cardId = $('#fMissCardId').value;
  if (!cardId) { toast('请输入就诊卡ID', 'err'); return; }
  api('/visit/credit/miss?cardId=' + cardId + '&pageNum=' + pageNum + '&pageSize=10').then(r => {
    if (r.code !== 200 || !r.data) return;
    let h = '<table><thead><tr><th>ID</th><th>就诊卡ID</th><th>计划ID</th><th>状态</th><th>时间</th></tr></thead><tbody>';
    (r.data.list || []).forEach(a => { const stLbl={1:'❌失约',2:'🚫取消'}; h += '<tr><td>' + a.id + '</td><td>' + a.cardId + '</td><td>' + a.planId + '</td><td>' + (stLbl[a.status]||'❌失约') + '</td><td>' + (a.gmtCreate||'') + '</td></tr>'; });
    h += '</tbody></table>' + renderPagination(r.data.total, pageNum, 10, 'queryMiss');
    $('#missResult').innerHTML = h;
  }).catch(e => toast(e.message, 'err'));
}

// ==================== 11. 用户信息 ====================
function users(pageNum) {
  pageNum = pageNum || 1;
  let nameFilter = (window._unVal || ''), phoneFilter = (window._upVal || '');
  const params = new URLSearchParams({ pageNum: pageNum, pageSize: 10 });
  if (nameFilter) params.append('name', nameFilter);
  if (phoneFilter) params.append('phone', phoneFilter);
  api('/user/basic/list?' + params).then(r => {
    if (r.code !== 200 || !r.data) return;
    let h = '<div class="page-title">👤 用户信息</div><div class="card"><div class="card-title">用户列表</div><div class="search-bar"><div class="field"><label>姓名</label><input id="unInput" placeholder="搜索..." value="' + (nameFilter||'') + '"></div><div class="field"><label>手机号</label><input id="upInput" placeholder="搜索..." value="' + (phoneFilter||'') + '"></div><button class="btn-p btn-sm" onclick="window._unVal=$(\'#unInput\').value;window._upVal=$(\'#upInput\').value;users(1)">🔍</button><button class="btn-o btn-sm" onclick="window._unVal=\'\';window._upVal=\'\';users(1)">重置</button></div><table><thead><tr><th>ID</th><th>昵称</th><th>头像</th><th>手机号</th><th>性别</th><th>状态</th><th>注册时间</th><th>操作</th></tr></thead><tbody>';
    (r.data.list || []).forEach(u => {
      h += '<tr><td>' + u.id + '</td><td><b>' + (u.nickname||u.name||'') + '</b></td><td>' + (u.avatarUrl ? '<img src="' + u.avatarUrl + '" style="width:36px;height:36px;border-radius:50%">' : '-') + '</td><td>' + (u.phone||'') + '</td><td>' + (u.gender===1?'男':u.gender===2?'女':'-') + '</td><td><span class="tag ' + (u.status===1?'tag-on':'tag-off') + '">' + (u.status===1?'正常':'禁用') + '</span></td><td>' + (u.gmtCreate||'') + '</td><td><button class="btn-d btn-xs" onclick="deleteUser(' + u.id + ')">🗑️</button></td></tr>';
    });
    h += '</tbody></table>' + renderPagination(r.data.total, pageNum, 10, 'users') + '</div>';
    $('#pageContent').innerHTML = h;
  }).catch(e => toast(e.message, 'err'));
}

function deleteUser(id) {
  if (!confirm('确认删除此用户？')) return;
  api('/user/basic/' + id, { method: 'DELETE' }).then(res => { if (res.code === 200) { toast('删除成功'); users(); } else toast(res.message, 'err'); }).catch(e => toast(e.message, 'err'));
}

// ==================== 13. 账号管理 ====================
function accounts() {
  let h = '<div class="page-title">🔑 账号管理</div><div class="tabs"><button class="active" onclick="accTab(\'register\')">注册账号</button><button onclick="accTab(\'status\')">状态管理</button><button onclick="accTab(\'role\')">分配角色</button></div><div id="accContent"></div>';
  $('#pageContent').innerHTML = h;
  accTab('register');
}

function accTab(tab) {
  $$('.tabs button').forEach((b, i) => b.classList.toggle('active', (i === 0 && tab === 'register') || (i === 1 && tab === 'status') || (i === 2 && tab === 'role')));
  let inner = '';
  if (tab === 'register') {
    inner = '<div class="card"><div class="card-title">注册管理账号</div><div class="form-row"><div class="form-col"><label>账号名称 *</label><input id="fAccName"><button class="btn-o btn-xs" style="margin-top:4px;width:auto" onclick="checkAccName()">验证是否可用</button><span id="accNameCheck" style="font-size:12px;margin-top:4px"></span></div><div class="form-col"><label>密码 *</label><input id="fAccPwd" type="password"></div></div><button class="btn-p btn-sm" onclick="registerAcc()">注册</button></div>';
  } else if (tab === 'status') {
    inner = '<div class="card"><div class="card-title">更新账号状态</div><div class="form-row"><div class="form-col"><label>账号ID *</label><input id="fAccStatusId" type="number"></div><div class="form-col"><label>状态 *</label><select id="fAccStatus"><option value="1">启用</option><option value="0">禁用</option></select></div></div><button class="btn-p btn-sm" onclick="updateAccStatus()">更新</button></div>';
  } else {
    inner = '<div class="card"><div class="card-title">分配角色</div><div class="form-row"><div class="form-col"><label>账号ID *</label><input id="fAccRoleAccId" type="number"></div></div><div id="roleCheckboxes" style="margin-top:12px">加载角色列表中...</div><button class="btn-p btn-sm" style="margin-top:12px" onclick="assignRoles()">保存</button></div>';
    setTimeout(() => {
      api('/power/role/list?pageNum=1&pageSize=200').then(r => {
        if (r.code === 200 && r.data) {
          let ch = '<div class="btn-group" style="flex-direction:column;align-items:flex-start">';
          (r.data.list || []).forEach(role => { ch += '<label style="display:flex;align-items:center;gap:6px;padding:4px 0"><input type="checkbox" value="' + role.id + '" class="role-cb"> ' + (role.chineseName||role.name) + ' (ID:' + role.id + ')</label>'; });
          ch += '</div>';
          $('#roleCheckboxes').innerHTML = ch;
        }
      }).catch(() => {});
    }, 100);
  }
  $('#accContent').innerHTML = inner;
}

function checkAccName() {
  const name = $('#fAccName').value;
  if (!name) { toast('请输入账号名称', 'err'); return; }
  api('/power/account/name/validation?name=' + encodeURIComponent(name)).then(r => {
    if (r.code === 200) {
      const el = $('#accNameCheck');
      el.textContent = r.data ? '❌ 已存在' : '✅ 可用';
      el.style.color = r.data ? 'var(--danger)' : 'var(--success)';
    }
  }).catch(e => toast(e.message, 'err'));
}

function registerAcc() {
  const name = $('#fAccName').value, password = $('#fAccPwd').value;
  if (!name || !password) { toast('请填写完整', 'err'); return; }
  api('/power/account/admin/register', { method: 'POST', body: JSON.stringify({ name: name, password: password }) }).then(res => { if (res.code === 200) { toast('注册成功'); $('#fAccName').value = ''; $('#fAccPwd').value = ''; } else toast(res.message, 'err'); }).catch(e => toast(e.message, 'err'));
}

function updateAccStatus() {
  const accountId = parseInt($('#fAccStatusId').value), status = parseInt($('#fAccStatus').value);
  if (!accountId) { toast('请输入账号ID', 'err'); return; }
  api('/power/account/status', { method: 'PUT', body: JSON.stringify({ accountId: accountId, status: status }) }).then(res => { if (res.code === 200) toast('状态更新成功'); else toast(res.message, 'err'); }).catch(e => toast(e.message, 'err'));
}

function assignRoles() {
  const accountId = parseInt($('#fAccRoleAccId').value);
  if (!accountId) { toast('请输入账号ID', 'err'); return; }
  const roleIds = [];
  $$('.role-cb:checked').forEach(cb => roleIds.push(parseInt(cb.value)));
  const params = new URLSearchParams({ accountId: accountId });
  roleIds.forEach(id => params.append('roleIdList', id));
  fetch(BASE + '/power/account/role?' + params, { method: 'POST', headers: token ? { 'Authorization': 'Bearer ' + token } : {} }).then(r => r.json()).then(res => { if (res.code === 200) toast('角色分配成功，影响 ' + res.data + ' 条'); else toast(res.message, 'err'); }).catch(e => toast(e.message, 'err'));
}

// ==================== 14. 角色管理 ====================
function roles(pageNum) {
  pageNum = pageNum || 1;
  api('/power/role/list?pageNum=' + pageNum + '&pageSize=10').then(r => {
    if (r.code !== 200 || !r.data) return;
    let h = '<div class="page-title">👥 角色管理</div><div class="card"><div class="card-title">角色列表<button class="btn-p btn-sm" onclick="showRoleModal()">+ 添加角色</button></div><table><thead><tr><th>ID</th><th>英文名</th><th>中文名</th><th>状态</th><th>排序</th><th>操作</th></tr></thead><tbody>';
    (r.data.list || []).forEach(role => {
      h += '<tr><td>' + role.id + '</td><td>' + (role.name||'') + '</td><td><b>' + (role.chineseName||'') + '</b></td><td><span class="tag ' + (role.status===1?'tag-on':'tag-off') + '">' + (role.status===1?'启用':'禁用') + '</span></td><td>' + (role.sort||0) + '</td><td><div class="btn-group"><button class="btn-o btn-xs" onclick="showRoleModal(' + role.id + ')">✏️</button><button class="btn-o btn-xs" onclick="toggleRoleStatus(' + role.id + ',' + role.status + ')">' + (role.status===1?'禁用':'启用') + '</button><button class="btn-o btn-xs" onclick="showRoleAllocModal(' + role.id + ',\'resource\')">🔗资源</button><button class="btn-d btn-xs" onclick="deleteRole(' + role.id + ')">🗑️</button></div></td></tr>';
    });
    h += '</tbody></table>' + renderPagination(r.data.total, pageNum, 10, 'roles') + '</div>';
    $('#pageContent').innerHTML = h;
  }).catch(e => toast(e.message, 'err'));
}

function showRoleModal(id) {
  const isEdit = !!id;
  function render(d) {
    d = d || {};
    showModal(isEdit ? '编辑角色' : '添加角色',
      '<div class="form-row"><div class="form-col"><label>英文名 *</label><input id="fRoleName" value="' + (d.name||'') + '"></div><div class="form-col"><label>中文名 *</label><input id="fRoleCName" value="' + (d.chineseName||'') + '"></div><div class="form-col"><label>状态</label><select id="fRoleStatus"><option value="1"' + (d.status!==0?' selected':'') + '>启用</option><option value="0"' + (d.status===0?' selected':'') + '>禁用</option></select></div><div class="form-col"><label>排序</label><input id="fRoleSort" type="number" value="' + (d.sort||0) + '"></div></div>',
      () => {
        const body = { name: $('#fRoleName').value, chineseName: $('#fRoleCName').value, status: parseInt($('#fRoleStatus').value), sort: parseInt($('#fRoleSort').value) || 0 };
        const method = isEdit ? 'PUT' : 'POST';
        const url = isEdit ? '/power/role/' + id : '/power/role';
        api(url, { method: method, body: JSON.stringify(body) }).then(res => { if (res.code === 200) { toast(isEdit ? '更新成功' : '添加成功'); closeModal(); roles(); } else toast(res.message, 'err'); }).catch(e => toast(e.message, 'err'));
      });
  }
  if (isEdit) {
    api('/power/role/list?pageNum=1&pageSize=500').then(r => { const list = (r.data && r.data.list) ? r.data.list : []; render(list.find(x => x.id === id) || {}); }).catch(() => render({}));
  } else render({});
}

function toggleRoleStatus(id, currentStatus) {
  const newStatus = currentStatus === 1 ? 0 : 1;
  api('/power/role/status/' + id, { method: 'PUT', body: JSON.stringify({ status: newStatus }) }).then(res => { if (res.code === 200) { toast('状态更新成功'); roles(); } else toast(res.message, 'err'); }).catch(e => toast(e.message, 'err'));
}

function showRoleAllocModal(roleId) {
  showModal('分配资源 (角色ID: ' + roleId + ')', '<div id="allocContent">加载中...</div>', null, { wide: true });
  Promise.all([api('/power/role/resource/' + roleId).catch(() => ({ data: [] })), api('/power/resource/list').catch(() => ({ data: [] }))]).then(([linked, all]) => {
    const linkedList = linked.data || [];
    const allList = all.data || [];

// ==================== WEBSOCKET 预约提醒 ====================
let ws = null;
let wsReconnectTimer = null;

function connectWebSocket() {
  if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
  const sid = 'admin-' + Date.now();
  const protocol = location.protocol === 'https:' ? 'wss://' : 'ws://';
  ws = new WebSocket(protocol + location.host + BASE + '/ws/' + sid);
  ws.onopen = () => console.log('WebSocket已连接: ' + sid);
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      showWsNotification(msg.type, msg.content, msg.appointmentId);
      playNotifySound(msg.type);
      speakNotify(msg.type);
    } catch (err) { console.warn('WebSocket消息解析失败', err); }
  };
  ws.onclose = () => {
    ws = null;
    // 已登录状态下 5 秒后自动重连
    if (token) wsReconnectTimer = setTimeout(connectWebSocket, 5000);
  };
  ws.onerror = () => { try { ws.close(); } catch (e) {} };
}

function closeWebSocket() {
  if (wsReconnectTimer) { clearTimeout(wsReconnectTimer); wsReconnectTimer = null; }
  if (ws) { ws.onclose = null; try { ws.close(); } catch (e) {} ws = null; }
}

const escapeHtml = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

function showWsNotification(type, content, appointmentId) {
  const wrap = $('#wsNotifyContainer');
  const div = document.createElement('div');
  div.className = 'ws-notify' + (type === 2 ? ' ws-cancel' : '');
  const title = type === 2 ? '⚠️ 取消预约提醒' : '🔔 新预约提醒';
  div.innerHTML = '<div class="ws-title"><span>' + title + '</span></div>'
    + '<div class="ws-content">' + escapeHtml(content) + (appointmentId ? '（预约号：' + escapeHtml(appointmentId) + '）' : '') + '</div>'
    + '<div style="text-align:right;margin-top:10px"><button class="btn-p btn-sm ws-ack">我知道了</button></div>';
  // 常驻显示，仅点击"我知道了"关闭
  div.querySelector('.ws-ack').onclick = () => div.remove();
  wrap.appendChild(div);
}

// ---- 音频上下文与自动播放解锁 ----
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return null; }
  }
  if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
  return audioCtx;
}

// 浏览器自动播放策略：首次用户交互时预热音频与语音合成（一次性）
['click', 'keydown'].forEach(evt => document.addEventListener(evt, () => {
  getAudioCtx();
  if (window.speechSynthesis) { try { speechSynthesis.speak(new SpeechSynthesisUtterance('')); } catch (e) {} }
}, { once: true }));

function playNotifySound(type) {
  try {
    const ctx = getAudioCtx();
    if (!ctx) return;
    // type=1 双音"叮咚"，type=2 低音警示
    const tones = type === 2 ? [{ f: 440, t: 0, d: .35 }] : [{ f: 830, t: 0, d: .18 }, { f: 660, t: .2, d: .25 }];
    tones.forEach(x => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = x.f;
      gain.gain.setValueAtTime(.4, ctx.currentTime + x.t);
      gain.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + x.t + x.d);
      osc.start(ctx.currentTime + x.t); osc.stop(ctx.currentTime + x.t + x.d);
    });
  } catch (e) { /* 浏览器不支持或未授权音频时静默降级 */ }
}

function speakNotify(type) {
  try {
    if (!window.speechSynthesis) return;
    const text = type === 2 ? '有患者取消预约，请注意查看' : '您有新的预约挂号，请及时处理';
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'zh-CN';
    utter.rate = 1;
    utter.volume = 1;
    // 稍延迟播报，避开"叮咚"引导音
    setTimeout(() => speechSynthesis.speak(utter), 500);
  } catch (e) { /* 不支持语音合成时静默降级，仅保留提示音 */ }
}

const AI_BASE = 'http://' + location.hostname + ':8000';
let kbPollTimer = null;

const aiApi = (url, opts = {}) => {
  const headers = { ...opts.headers };
  if (!(opts.body instanceof FormData)) headers['Content-Type'] = 'application/json';
  if (token) headers['Authorization'] = 'Bearer ' + token;
  return fetch(AI_BASE + url, { ...opts, headers }).then(r => {
    if (r.status === 401) { doLogout(); throw new Error('登录已过期'); }
    return r.json();
  });
};

function kbEsc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

function kbFmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(2) + ' MB';
}

function kbTest() {
  const q = $('#kbTestQ').value.trim();
  if (!q) { toast('请输入测试问题', 'err'); return; }
  $('#kbTestResult').innerHTML = '<div style="color:var(--text3)">检索中…</div>';
  aiApi('/api/kb/retrieve/test', { method: 'POST', body: JSON.stringify({ question: q, topK: 5 }) }).then(res => {
    if (res.code !== 200) { toast(res.message, 'err'); $('#kbTestResult').innerHTML = ''; return; }
    if (!res.data.length) { $('#kbTestResult').innerHTML = '<div style="color:var(--text3)">未检索到相关内容（知识库为空或全部停用）</div>'; return; }
    let h = '';
    res.data.forEach((r, i) => {
      const pct = Math.max(0, Math.min(100, Math.round(r.score * 100)));
      h += '<div style="border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:8px">'
        + '<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:4px"><span>Top' + (i + 1) + ' · ' + kbEsc(r.docName) + ' · 分块#' + r.chunkIndex + '</span><span>相关度 ' + r.score + '</span></div>'
        + '<div style="height:4px;background:#f0f0f0;border-radius:2px;margin-bottom:6px"><div style="height:4px;width:' + pct + '%;background:var(--primary);border-radius:2px"></div></div>'
        + '<div style="white-space:pre-wrap;font-size:13px">' + kbEsc(r.content) + '</div></div>';
    });
    $('#kbTestResult').innerHTML = h;
  }).catch(e => { toast(e.message, 'err'); $('#kbTestResult').innerHTML = ''; });
}

});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !$('#loginPage').classList.contains('hidden')) doLogin();
});

(function() {
  const savedToken = localStorage.getItem('admin_token');
  if (savedToken) {
    token = savedToken;
    // Validate token by getting account info
    api('/power/account/info').then(res => {
      if (res.code === 200) { showMain(); }
      else { doLogout(); }
    }).catch(() => { doLogout(); });
  }
})();
