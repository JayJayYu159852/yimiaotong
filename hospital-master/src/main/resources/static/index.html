<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>医秒通</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--g:#0ac76f;--gd:#08a15a;--r:#ef4444;--bg:#f3f4f6;--c:#fff;--t:#1a1a2e;--t2:#6b7280;--b:#e5e7eb}
body{max-width:430px;margin:0 auto;font:15px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--t);min-height:100vh;-webkit-tap-highlight-color:transparent}
.hdr{position:sticky;top:0;z-index:99;background:linear-gradient(135deg,var(--g),var(--gd));color:#fff;padding:12px 16px;text-align:center;box-shadow:0 2px 12px rgba(10,196,111,.2)}
.hdr h2{font-size:17px;font-weight:700;letter-spacing:.5px}
.tbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:430px;width:100%;display:flex;background:var(--c);border-top:1px solid var(--b);z-index:99;padding-bottom:env(safe-area-inset-bottom,0)}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:3px 0 1px;font-size:9px;color:var(--t2);cursor:pointer;border:none;background:none;transition:.08s;-webkit-tap-highlight-color:transparent}
.tb.on{color:var(--g);font-weight:600}.tb .em{font-size:16px;line-height:1.2}.tb:active{opacity:.6}
.pg{display:none;padding:8px 12px 96px;animation:in .2s}.pg.on{display:block}
@keyframes in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.card{background:var(--c);border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.ftb{padding:10px 28px;border-radius:22px;font-size:14px;font-weight:600;cursor:pointer;border:1.5px solid var(--b);background:var(--c);color:var(--t2);transition:.15s}
.ftb.on{background:linear-gradient(135deg,var(--g),var(--gd));color:#fff;border-color:transparent;box-shadow:0 2px 10px rgba(10,196,111,.3)}
.ftb:active{transform:scale(.95)}
.btn{display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:22px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.btn:active{transform:scale(.96)}.btn-p{background:linear-gradient(135deg,var(--g),var(--gd));color:#fff;width:100%;padding:11px;box-shadow:0 3px 10px rgba(10,196,111,.25)}
.btn-r{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;width:100%;padding:9px;font-size:13px;box-shadow:0 3px 10px rgba(239,68,68,.25)}
.btn-o{background:#fff;color:var(--g);border:1.5px solid var(--g);padding:6px 14px;font-size:12px}
.btn-s{background:#e5e7eb;color:#9ca3af;padding:6px 14px;font-size:12px}
.inp{width:100%;padding:10px 12px;border:1.5px solid var(--b);border-radius:10px;font-size:14px;outline:none;background:#fafbfc}
.inp:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(10,196,111,.06);background:#fff}
.ir{display:flex;gap:6px}.ir .inp{flex:1}
.tag{padding:3px 10px;border-radius:15px;font-size:11px;font-weight:500;display:inline-block}
.tbl{background:#e0f2fe;color:#0284c7}.tgc{background:#dcfce7;color:#16a34a}
.to{background:#fff7ed;color:#c2410c}.trc{background:#fef2f2;color:#dc2626}
.fc{background:var(--c);border-radius:12px;margin-bottom:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
.fc:last-child{margin-bottom:0}
.fc .fi{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:linear-gradient(135deg,#f0fdf4,#dcfce7)}
.fc .fb{padding:13px 14px}
.fc .fb h3{font-size:15px;font-weight:700;margin-bottom:6px;line-height:1.4;color:var(--t)}
.fc .fb p{font-size:13px;color:var(--t2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:2px}
.fc .fm{display:flex;align-items:center;justify-content:space-between;margin-top:10px;font-size:11px;color:#9ca3af}
.li{padding:13px 0;border-bottom:1px solid var(--b);cursor:pointer;display:flex;align-items:center;gap:10px}
.li:active{background:#f9fafb}.li:last-child{border:none}
.av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--g),#34d399);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.md{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:flex-end;justify-content:center}
.md.on{display:flex}.ms{background:#fff;border-radius:18px 18px 0 0;width:100%;max-width:430px;max-height:85vh;overflow-y:auto;padding:16px;animation:up .25s}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mh{width:32px;height:4px;background:#d1d5db;border-radius:2px;margin:0 auto 14px}
.mt{font-size:17px;font-weight:700;text-align:center;margin-bottom:14px}
.cd{padding:12px 0;border-bottom:1px dashed var(--b);display:flex;align-items:center;justify-content:space-between;font-size:13px}
.em{text-align:center;padding:40px 16px;color:#9ca3af}.em .ic{font-size:40px;margin-bottom:8px}
.sk{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}.sk .st{cursor:pointer}
.toast{position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.78);color:#fff;padding:12px 22px;border-radius:10px;z-index:999;font-size:13px;pointer-events:none;display:none}
.scd{aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;background:#f3f4f6;color:#9ca3af}
.scd.on{background:#10b981;color:#fff;font-weight:600}
.scd.td{background:#d1fae5;border:2px solid #10b981;color:#059669;font-weight:700;font-size:11px}
.scd.ft{background:#f9fafb;color:#d1d5db}
.scd.wk{color:var(--t2)}
.tog{text-align:center;margin-top:10px;font-size:12px;color:var(--g);cursor:pointer}
@media(prefers-color-scheme:dark){:root{--bg:#111;--c:#1f2937;--t:#f3f4f6;--t2:#9ca3af;--b:#374151}.inp{background:#111;color:#f3f4f6}}
/* ===== AI 助手 ===== */
.ai-b{max-width:82%;padding:10px 12px;border-radius:12px;margin-bottom:10px;font-size:14px;line-height:1.65;white-space:pre-wrap;word-break:break-word}
.ai-b-u{margin-left:auto;background:linear-gradient(135deg,var(--g),var(--gd));color:#fff;border-bottom-right-radius:4px;width:fit-content}
.ai-b-a{margin-right:auto;background:var(--c);border:1px solid var(--b);border-bottom-left-radius:4px;width:fit-content}
.ai-src{margin:-4px 0 10px;max-width:92%}
.ai-src details{background:#f0fdf6;border:1px solid #d1fae5;border-radius:10px;padding:8px 10px;font-size:12px}
.ai-src summary{color:var(--gd);cursor:pointer;font-weight:600}
.ai-src .sc{background:#fff;border:1px solid var(--b);border-radius:8px;padding:8px;margin-top:6px;color:var(--t2);white-space:pre-wrap}
.ai-inbar{position:fixed;bottom:52px;left:0;right:0;margin:0 auto;max-width:430px;width:100%;display:flex;gap:8px;align-items:flex-end;padding:8px 12px;background:var(--c);border-top:1px solid var(--b);z-index:100;box-shadow:0 -2px 8px rgba(0,0,0,.04)}
.ai-inbar textarea{flex:1 1 auto;min-width:0;border:1.5px solid var(--b);border-radius:18px;padding:9px 12px;font-size:14px;outline:none;resize:none;font-family:inherit;background:#fafbfc;line-height:1.4;max-height:92px;overflow-y:auto}
.ai-inbar button{width:auto;flex:0 0 auto;padding:9px 20px;border-radius:18px;font-size:14px;box-shadow:none}
.ai-inbar textarea:focus{border-color:var(--g)}
.ai-chip{display:inline-block;background:var(--c);border:1px solid var(--b);border-radius:16px;padding:7px 12px;font-size:12px;color:var(--t);margin:0 6px 8px 0;cursor:pointer}
.ai-chip:active{background:#f0fdf6;border-color:var(--g)}
.ai-cursor{display:inline-block;width:2px;height:14px;background:var(--g);vertical-align:-2px;animation:aiblink .8s infinite}
@keyframes aiblink{50%{opacity:0}}
</style>
</head>
<body>

<div class="hdr"><h2 id="ht">📰 医秒通</h2></div>

<!-- ===== 首页·资讯 ===== -->
<div class="pg on" id="p0">
  <div style="display:flex;justify-content:center;gap:12px;margin-bottom:14px"><button class="ftb on" id="fba" onclick="feedTab(0)">🌐 全部</button><button class="ftb" id="fbf" onclick="feedTab(1)">⭐ 关注</button></div>
  <div id="fl"><div class="em"><div class="ic">📭</div>暂无资讯</div></div>
</div>

<!-- ===== 医院 ===== -->
<div class="pg" id="p1">
  <input class="inp" id="hs" placeholder="🔍 搜索医院" oninput="hospitals()" style="margin-bottom:10px">
  <div id="hd" style="font-size:12px;color:var(--t2);margin:2px 0 8px;display:none">📍 已定位，按距离排序</div>
  <div id="hl"><div class="em">定位中…</div></div>
</div>

<!-- ===== 秒杀 ===== -->
<div class="pg" id="p2">
  <div style="font-size:16px;font-weight:700;margin-bottom:4px">⚡ 专家号抢号</div>
  <div style="font-size:12px;color:var(--t2);margin-bottom:8px">科室 → 医生 → 号源 → 开抢</div>
  <div class="sk" id="skTags"></div>
  <div id="skList"><div class="em">👆 选择上方科室</div></div>
</div>

<!-- ===== 我的 ===== -->
<div class="pg" id="p3">
  <div class="card" style="text-align:center">
    <div class="av" style="width:60px;height:60px;font-size:26px;margin:0 auto" id="ua">👤</div>
    <div style="font-size:17px;font-weight:700;margin-top:10px" id="un">未登录</div>
    <div style="font-size:12px;color:var(--t2)" id="up"></div>
    <button class="btn btn-p" style="margin-top:12px" onclick="showL()" id="lb">📱 手机号登录</button>
    <button class="btn btn-o" style="margin-top:6px;display:none" onclick="doSign()" id="sb">✍️ 今日打卡</button>
  </div>
  <!-- 健康打卡 -->
  <div class="card" id="sc" style="display:none">
    <div style="display:flex;justify-content:space-around;text-align:center;margin-bottom:12px">
      <div><b id="scc" style="font-size:26px;color:#10b981">0</b><br><span style="font-size:11px;color:var(--t2)">🔥 连续打卡</span></div>
      <div style="width:1px;background:var(--b)"></div>
      <div><b id="scm" style="font-size:26px;color:var(--g)">0</b><br><span style="font-size:11px;color:var(--t2)">📅 本月打卡</span></div>
    </div>
    <div id="sccal" style="margin-bottom:6px"></div>
  </div>
  <!-- 钱包 -->
  <div class="card" id="walletCard" style="display:none;cursor:pointer" onclick="myWallet()">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div><span style="font-size:12px;color:var(--t2)">💰 虚拟钱包</span><br><span id="walletBalance" style="font-size:24px;font-weight:700;color:var(--g)">¥0.00</span></div>
      <span style="color:var(--t2);font-size:20px">›</span>
    </div>
  </div>
  <!-- 就诊卡信息待完善提示 -->
  <div class="card" id="cardBanner" style="display:none;background:#fff7ed;border:1px solid #fbbf24">
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:24px">⚠️</span>
      <div style="flex:1">
        <div style="font-weight:600;font-size:13px;color:#92400e">就诊卡信息待完善</div>
        <div style="font-size:11px;color:#b45309">完善身份证信息后即可预约挂号</div>
      </div>
      <button class="btn btn-o" onclick="editDefaultCard()" style="flex-shrink:0;font-size:12px">去完善</button>
    </div>
  </div>
  <div class="li" onclick="myApps()">📋 我的预约 <span style="color:var(--t2);margin-left:auto">→</span></div>
  <div class="li" onclick="myCards()">💳 就诊卡管理 <span style="color:var(--t2);margin-left:auto">→</span></div>
  <div class="li" onclick="myCases()">📄 病例查询 <span style="color:var(--t2);margin-left:auto">→</span></div>
  <div class="li" onclick="myWallet()">💰 我的钱包 <span style="color:var(--t2);margin-left:auto">→</span></div>
  <div class="li" onclick="myCredit()">📊 我的信用 <span style="color:var(--t2);margin-left:auto">→</span></div>
  <div class="li" onclick="rank()">🏆 医生排行榜 <span style="color:var(--t2);margin-left:auto">→</span></div>
  <div class="li" onclick="editPwd()">🔒 修改密码 <span style="color:var(--t2);margin-left:auto">→</span></div>
  <div class="li" onclick="doLogout()" id="loBtn" style="display:none">🚪 退出登录</div>
  <div class="li" onclick="showL()" id="swBtn">🔄 切换账号</div>
</div>

<!-- AI 助手 -->
<div class="pg" id="p4">
  <div class="card" id="aiTip" style="text-align:center;padding:30px 14px;display:none">
    <div style="font-size:40px">🤖</div>
    <div style="margin:8px 0;font-weight:600">AI 智能助手</div>
    <div style="color:var(--t2);font-size:13px;margin-bottom:14px">登录后即可咨询挂号流程、退号退费、就诊须知等问题</div>
    <button class="btn btn-p" onclick="showL()" style="width:60%">去登录</button>
  </div>
  <div id="aiBody" style="display:none">
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button class="ftb" onclick="aiConvs()" style="padding:7px 16px;font-size:12px">🗂 会话记录</button>
      <button class="ftb" onclick="aiNew()" style="padding:7px 16px;font-size:12px">✚ 新对话</button>
    </div>
    <div id="aiMsgs" style="padding:4px 0 120px"></div>
    <div class="ai-inbar">
      <textarea id="aiIn" rows="1" placeholder="输入你想问的问题，回车发送…"></textarea>
      <button type="button" class="btn btn-p" id="aiSendBtn">发送</button>
    </div>
  </div>
</div>

<!-- Tab bar -->
<div class="tbar">
  <div class="tb on" onclick="tab(0)"><span class="em">📰</span>资讯</div>
  <div class="tb" onclick="tab(1)"><span class="em">🏥</span>医院</div>
  <div class="tb" onclick="tab(2)"><span class="em">⚡</span>秒杀</div>
  <div class="tb" onclick="tab(3)"><span class="em">👤</span>我的</div>
  <div class="tb" onclick="tab(4)"><span class="em">🤖</span>AI助手</div>
</div>

<!-- Login sheet -->
<div class="md" id="ld"><div class="ms" id="lbx"></div></div>
<!-- Sheet -->
<div class="md" id="dd"><div class="ms" id="db"></div></div>
<div class="toast" id="tt"></div>

<script>
(function(){
  const A='';let tk=(localStorage.getItem('h_t')||'').trim(),u=null,feedMode=0,curSpec=null,loginMode='code';
  function $(id){return document.getElementById(id)}
  function tm(m){const t=$('tt');t.textContent=m;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',2000)}
  async function ap(m,url,b){
    const h={'Content-Type':'application/json'};if(tk)h['Authorization']='Bearer '+tk;
    const o={method:m,headers:h};if(b&&m!=='GET')o.body=JSON.stringify(b);
    let u=url;if(b&&m==='GET'){const c={};for(const[k,v]of Object.entries(b))if(v!=null&&v!=='')c[k]=v;u+='?'+new URLSearchParams(c).toString()}
    try{const r=await fetch(u,o),j=await r.json();if(j.code===401){tm('请先登录');return null}return j}
    catch(e){tm('网络错误');return null}
  }
  // ===== 就诊卡工具函数 =====
  let _defCardCache=null;
  let _defCardInfoCache=null;
  /** 检查就诊卡信息是否完整（有身份证号即为完整） */
  function isCardComplete(card){return card&&card.identificationNumber&&card.identificationNumber.trim().length>0}
  /** 获取默认就诊卡 ID（缓存） */
  async function defaultCard(){
    if(!u)return null;
    if(_defCardCache)return _defCardCache;
    const r=await ap('GET','user/card/list/'+u.id);
    const cards=r&&r.data?r.data:[];
    if(!cards.length)return null;
    _defCardCache=cards[0].id;
    return _defCardCache;
  }
  /** 获取默认就诊卡完整信息（缓存） */
  async function defaultCardInfo(){
    if(!u)return null;
    if(_defCardInfoCache)return _defCardInfoCache;
    const r=await ap('GET','user/card/list/'+u.id);
    const cards=r&&r.data?r.data:[];
    if(!cards.length)return null;
    _defCardInfoCache=cards[0];
    return _defCardInfoCache;
  }
  window.invalidateCardCache=function(){_defCardCache=null;_defCardInfoCache=null}
  /** 检查当前用户默认就诊卡是否完整，控制横幅显示 */
  async function loadCardStatus(){
    if(!u)return;
    const r=await ap('GET','user/card/list/'+u.id);
    const cards=r&&r.data?r.data:[];
    if(cards.length>0){_defCardInfoCache=cards[0];$('cardBanner').style.display=isCardComplete(cards[0])?'none':'block'}
  }
  /** 身份证号非法提示（18位数字或末位X） */
  function showIdPrompt(){tm('请输入18位身份证号（数字或末位X）')}

  window.tab=function(i){
    document.querySelectorAll('.tb').forEach((t,x)=>t.classList.toggle('on',x===i));
    document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));$('p'+i).classList.add('on');
    $('ht').textContent=['📰 医秒通','🏥 找医院','⚡ 秒杀抢号','👤 我的','🤖 AI助手'][i];
    if(i===0)feedLoad();if(i===1)hospitals();if(i===2)splans();if(i===3)mine();if(i===4)aiInit();
  };

  // ===== Login =====
  function renderLogin(){
    const isCode=loginMode==='code';
    $('lbx').innerHTML=`<div class="mh"></div><div class="mt">📱 ${isCode?'验证码登录':'密码登录'}</div>
      <input class="inp" id="lp" placeholder="11位手机号" type="tel" maxlength="11">
      ${isCode?`<div class="ir" style="margin-top:8px"><input class="inp" id="lc" placeholder="验证码" maxlength="6"><button class="btn btn-o" onclick="sms()" id="sbtn" style="flex-shrink:0">获取验证码</button></div>`:`<input class="inp" id="lpwd" type="password" placeholder="登录密码" style="margin-top:8px">`}
      <div class="tog" onclick="switchMode()">${isCode?'→ 切换密码登录':'→ 切换验证码登录'}</div>
      <button class="btn btn-p" onclick="login()" style="margin-top:10px">登 录</button>
      <div class="tog" style="color:var(--t2);margin-top:6px" onclick="hideL()">先逛逛</div>`;
    if(!isCode) document.getElementById('lp').value='';
  }
  window.switchMode=function(){loginMode=(loginMode==='code'?'pwd':'code');renderLogin()}
  window.showL=function(){loginMode='code';renderLogin();$('ld').classList.add('on')}
  window.hideL=function(){$('ld').classList.remove('on')}

  // ===== Feed =====
  window.sms=async function(){
    const p=document.getElementById('lp');if(!p)return;const v=p.value.trim();
    if(!/^1[3-9]\d{9}$/.test(v))return tm('请输入正确的11位手机号');
    await ap('GET','user/basic/message',{phone:v});tm('验证码已发送，查看控制台');
    let cd=60;const b=$('sbtn');b.disabled=true;const iv=setInterval(()=>{cd--;b.textContent=cd+'s';if(cd<=0){clearInterval(iv);b.textContent='获取验证码';b.disabled=false}},1000);
  };
  window.login=async function(){
    const p=document.getElementById('lp');if(!p)return;const ph=p.value.trim();if(!ph)return tm('请填写手机号');
    let r;
    if(loginMode==='code'){
      const c=document.getElementById('lc');if(!c||!c.value.trim())return tm('请填写验证码');
      r=await ap('POST','user/basic/login',{phone:ph,code:c.value.trim()});
      if(!r)return;
      if(r.code===200){tk=(r.data||'').trim();localStorage.setItem('h_t',tk);$('ld').classList.remove('on');mine();tm('登录成功！')}
      else if(r.message&&r.message.indexOf('请填写注册信息')!==-1)regForm(ph,c.value.trim());
      else tm(r.message);
    }else{
      const w=document.getElementById('lpwd');if(!w||!w.value.trim())return tm('请填写密码');
      r=await ap('POST','user/basic/login',{phone:ph,password:w.value.trim()});
      if(!r)return;
      if(r.code===200){tk=(r.data||'').trim();localStorage.setItem('h_t',tk);$('ld').classList.remove('on');mine();tm('登录成功！')}
      else tm(r.message);
    }
  };
  function regForm(ph,cd){

    try{
      const r=await fetch(AI_BASE+'/api/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+tk},body:JSON.stringify({question:q,conversationId:aiConvId})});
      if(r.status===401){bub.remove();tm('请先登录');showL();return}
      // 限流/额度等前置校验失败时返回 JSON 而非事件流
      if((r.headers.get('content-type')||'').includes('application/json')){
        const j=await r.json();bub.innerHTML=aiEsc(j.message||'请求失败');return
      }
      if(!r.ok||!r.body)throw new Error('服务不可用');
      const rd=r.body.getReader(),dec=new TextDecoder();let buf='';
      while(true){
        const {done,value}=await rd.read();if(done)break;
        buf+=dec.decode(value,{stream:true});
        const parts=buf.split('\n\n');buf=parts.pop();
        for(const p of parts){
          if(!p.startsWith('data: '))continue;
          let ev;try{ev=JSON.parse(p.slice(6))}catch(e){continue}
          if(ev.type==='sources')srcs=ev.sources;
          else if(ev.type==='delta'){text+=ev.content;bub.innerHTML=aiEsc(text)+'<span class="ai-cursor"></span>';aiScroll()}
          else if(ev.type==='done')doneEv=ev;
          else if(ev.type==='error'){text=text||ev.message}
        }
      }
      bub.innerHTML=aiEsc(text||'抱歉，我暂时无法回答，请稍后再试');
      aiSources(srcs);
      if(doneEv){
        aiConvId=doneEv.conversationId;
        if(doneEv.toolUsed){const n=document.createElement('div');n.style.cssText='margin:-4px 0 6px;font-size:11px;color:var(--t2)';n.textContent='🔍 已查询实时号源数据';$('aiMsgs').appendChild(n)}
        if(doneEv.assistantMsgId)aiFbRow(doneEv.assistantMsgId,0)
      }
    }catch(e){bub.innerHTML=aiEsc('网络异常，请确认AI服务已启动')}
    finally{aiBusy=false;$('aiSendBtn').disabled=false;aiScroll()}
  };

  window.aiNew=function(){aiWelcome();tm('已开启新对话')};
  window.aiConvs=async function(){
    const r=await fetch(AI_BASE+'/api/chat/conversations',{headers:{'Authorization':'Bearer '+tk}}).then(x=>x.json()).catch(()=>null);
    if(!r||r.code!==200){tm('加载失败');return}
    let h=r.data.length?'':'<div style="color:var(--t2);text-align:center;padding:20px 0">暂无历史会话</div>';
    r.data.forEach(c=>{
      h+=`<div class="cd" style="align-items:center"><span style="flex:1;overflow:hidden;cursor:pointer" onclick="aiLoadConv(${c.id});closeS()">💬 ${aiEsc(c.title)}<br><span style="font-size:10px;color:var(--t2)">${c.updateTime}</span></span><button class="btn btn-o" style="padding:4px 10px;font-size:11px;flex-shrink:0" onclick="aiDelConv(${c.id})">删除</button></div>`;
    });
    sheet('🗂 会话记录',h);
  };
  window.aiDelConv=async function(id){
    if(!confirm('删除该会话及全部消息记录？'))return;
    const r=await fetch(AI_BASE+'/api/chat/conversation/'+id,{method:'DELETE',headers:{'Authorization':'Bearer '+tk}}).then(x=>x.json()).catch(()=>null);
    if(r&&r.code===200){tm('已删除');if(aiConvId===id)aiWelcome();aiConvs()}else tm((r&&r.message)||'删除失败');
  };
  window.aiLoadConv=async function(id){
    const r=await fetch(AI_BASE+'/api/chat/messages/'+id,{headers:{'Authorization':'Bearer '+tk}}).then(x=>x.json()).catch(()=>null);
    if(!r||r.code!==200){tm((r&&r.message)||'加载失败');aiWelcome();return}
    aiConvId=id;$('aiMsgs').innerHTML='';
    r.data.forEach(m=>{
      aiBubble(m.role==='user'?'u':'a',m.content);
      if(m.role==='assistant'){aiSources(m.sources);aiFbRow(m.id,m.feedback)}
    });
    aiScroll();
  };
  function aiFbRow(msgId,cur){
    const d=document.createElement('div');d.style.cssText='margin:-4px 0 10px;font-size:14px';
    d.innerHTML=`<span style="cursor:pointer;opacity:${cur===1?1:.35}" onclick="aiFb(this,${msgId},1)">👍</span> <span style="cursor:pointer;opacity:${cur===2?1:.35}" onclick="aiFb(this,${msgId},2)">👎</span>`;
    $('aiMsgs').appendChild(d);
  }
  window.aiFb=async function(el,msgId,val){
    const send=el.style.opacity==='1'?0:val; // 再点一次=取消
    const r=await fetch(AI_BASE+'/api/chat/feedback',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+tk},body:JSON.stringify({messageId:msgId,feedback:send})}).then(x=>x.json()).catch(()=>null);
    if(r&&r.code===200){
      el.parentElement.querySelectorAll('span').forEach((s,i)=>s.style.opacity=(send!==0&&i===send-1)?'1':'.35');
      if(send!==0)tm('感谢反馈');
    }
  };

  // 输入框事件绑定：回车发送（Shift+Enter换行）、中文输入法选词回车不误发、高度自适应
  (function(){
    const ta=$('aiIn');
    if(!ta)return;
    ta.addEventListener('keydown',function(e){
      if(e.key==='Enter'&&!e.shiftKey&&!e.isComposing){e.preventDefault();aiSend()}
    });
    ta.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,92)+'px'});
    $('aiSendBtn').addEventListener('click',function(){aiSend()});
  })();

  // ===== Init =====
  if(tk)mine();feedLoad();
  if(navigator.geolocation){navigator.geolocation.getCurrentPosition(p=>{uLoc={lat:p.coords.latitude,lng:p.coords.longitude};$('hd').style.display='block';hospitals()},()=>{hospitals()},{timeout:5000})}else hospitals()
  $('dd').addEventListener('click',function(e){if(e.target===this)closeS()})
})();
</script>
