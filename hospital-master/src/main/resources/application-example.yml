# =====================================================================
# 配置模板：复制本文件为 application.yml 并填入真实配置后启动
# application.yml 已加入 .gitignore，真实密钥不会被提交
# =====================================================================
spring:
  autoconfigure:
    exclude:
      # 本地开发环境未安装RabbitMQ时排除自动配置
      # 部署到有RabbitMQ的环境时，删除此配置即可恢复
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
  datasource:
    url: jdbc:mysql://localhost:3306/hospital?characterEncoding=UTF-8&useSSL=false&useUnicode=true&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: your-mysql-password
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      max-lifetime: 1200000
      maximum-pool-size: 20
      minimum-idle: 8
      idle-timeout: 300000

  servlet:
    multipart:
      # 最大支持文件大小
      max-file-size: 10MB

  jackson:
    # 全局日期序列化/反序列化时区（默认UTC会导致日期慢8小时跨天显示）
    time-zone: GMT+8

  redis:
    # Redis服务器地址
    host: 127.0.0.1
    # Redis数据库索引（db1：与 rag-service 的 db2 数据隔离）
    database: 1
    # Redis服务器连接端口
    port: 6379
    # Redis密码
    password: your-redis-password
    # 连接超时时间（毫秒）
    timeout: 10000ms
    lettuce:
      pool:
        # 连接池最大连接数（使用负值表示没有限制）
        max-active: 1024
        # 连接池最大阻塞等待时间（使用负值表示没有限制）
        max-wait: 10000ms
        # 连接池中的最大空闲连接
        max-idle: 200
        # 连接池中的最小空闲连接
        min-idle: 0
  main:
    allow-circular-references: true
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

  # RabbitMQ 消息队列配置
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    # 虚拟主机
    virtual-host: /
    # 发布确认模式（消息可靠投递）
    publisher-confirm-type: correlated
    # 发布消息推送到交换器回调
    publisher-returns: true
    listener:
      simple:
        # 消费者手动确认模式
        acknowledge-mode: manual
        # 每次批处理消息数
        prefetch: 10
        # 消费者并发数
        concurrency: 3
        max-concurrency: 10
        # 启动失败重试
        retry:
          enabled: true
          initial-interval: 3000ms
          max-attempts: 3

# MyBatis-Plus 配置
mybatis-plus:
  # PageHelper 由 pagehelper-spring-boot-starter 自动配置
  mapper-locations: classpath*:/cn/liyu/hospital/mapper/**/*.xml

server:
  port: 8080
  servlet:
    context-path: /hospital

# Knife4j 接口文档配置
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-swagger-models: true
    enable-document-manage: true
    swagger-model-name: 实体类
    enable-footer: false
    enable-footer-custom: true
    footer-custom-content: 医秒通 · 智慧医院挂号平台
    enable-global-parameter: true

# SpringDoc 基础配置（Knife4j 底层依赖）
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  # 分组配置 — 替代 SwaggerConfig 中已废弃的 GroupedOpenApi Bean 方式
  group-configs:
    - group: 管理端
      packages-to-scan: cn.liyu.hospital.controller.admin
    - group: 用户端
      packages-to-scan: cn.liyu.hospital.controller.user

# 自定义 JWT key
jwt:
  # JWT存储的请求头
  tokenHeader: Authorization
  # JWT加解密使用的密钥（需与 rag-service/.env 的 JWT_SECRET 保持一致）
  secret: your-jwt-secret-at-least-32-chars
  # JWT的超期限时间(60*60*12 = 12小时)
  expiration: 43200
  # JWT负载中拿到开头
  tokenHead: "Bearer "

# 阿里云短信服务配置
aliSms:
  # 是否开启模拟调用：开启后跳过真实短信发送，随机6位验证码打印到控制台日志（登录校验仍走 Redis 比对）
  mock: true
  # 阿里云短信服务 key
  accessKeyId: ""
  # 阿里云短信服务 secret
  accessSecret: ""
  # 短信抬头
  signName: ""
  # 注册短信验证码模板
  loginTemplate: "SMS_"
  regionId: "cn-hangzhou"
  domain: "dysmsapi.aliyuncs.com"
  version: "2017-05-25"

# 自定义 redis key 用于存储短信验证码
redis:
  key:
    prefix:
      authCode: "hospital:register:authCode:"
    expire:
      # 验证码超时时间（秒）
      authCode: 120

# MinIO 文件存储
minio:
  endpoint: http://localhost:9000
  accessKey: minioadmin
  secretKey: minioadmin
  bucket: hospital
  # 访问域名前缀
  url: http://localhost:9000/

# 阿里云 OSS 文件存储（默认存储策略）
hospital:
  alioss:
    endpoint: oss-cn-hangzhou.aliyuncs.com
    access-key-id: your-access-key-id
    access-key-secret: your-access-key-secret
    bucket-name: your-bucket-name

secure:
  ignored:
    urls: #安全路径白名单
      - /
      - /index.html
      - /admin.html
      - /swagger-ui.html
      - /swagger-ui/**
      - /swagger-resources/**
      - /swagger/**
      - /doc.html
      - /v3/api-docs/**
      - /v2/api-docs/**
      - /**/*.js
      - /**/*.css
      - /**/*.png
      - /**/*.ico
      - /webjars/**
      - /actuator/**
      - /ws/** #WebSocket握手路径（预约提醒推送）
      - /power/account/login
      - /power/account/register
      - /power/account/admin/**
      - /power/account/info
      - /power/account/logout
      - /power/name/validation
      - /user/basic/code
      - /user/basic/message
      - /user/basic/login
      - /user/basic/account/register
      - /hospital/info/list
      - GET:/hospital/info/*
      - /hospital/special/list/**
      - /hospital/special/list
      - /hospital/doctor/list/special/outpatient
      - /visit/plan/doctor
      - /visit/plan/doctor/date
      - /visit/plan/list
      - /hospital/doctor/**
      - GET:/hospital/notice/**
      # 秒杀：查库存公开，抢号（POST）需登录；reset 为测试接口，上线前删除
      - GET:/visit/seckill/**
      - POST:/visit/seckill/*/reset
      - /notice/**
      - /notice/list
      - /notice/list/all
      - /user/sign/**
      - /hospital/info/nearby

# ==================== 支付模块配置 ====================
payment:
  # 挂号费（单位：分），默认100分=1元
  appointment-fee: 100
  # 新用户注册赠送余额（单位：分），默认1000分=10元
  default-balance: 1000
  # 支付超时时间（分钟），默认15分钟
  expire-minutes: 15
  # 支付单号前缀
  order-no-prefix: "PAY"

# 小程序配置，用于调用官方API
wx:
  appId:
  appSecret:

# ==================== 日志配置 ====================
logging:
  level:
    # 输出 SQL（含参数），控制台能看到 select/insert/update 语句
    cn.liyu.hospital.mapper: DEBUG
